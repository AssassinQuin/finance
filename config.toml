# FCLI 配置文件
# 所有配置项都可以通过环境变量覆盖，格式: FCLI_{SECTION}_{KEY}

[general]
data_dir = "./data"
timeout = 10

# ============================================================
# 缓存配置 - 支持基于资产类型的差异化TTL
# ============================================================
[cache]
# 通用TTL
default_ttl = 300           # 默认缓存 5 分钟
search_ttl = 86400          # 搜索结果缓存 1 天

# 股票TTL（交易时段 vs 非交易时段）
stock_trading_ttl = 30      # 交易时段 30秒（实时性要求高）
stock_non_trading_ttl = 300 # 非交易时段 5分钟

# 基金TTL
fund_trading_ttl = 60       # 交易时段 1分钟
fund_non_trading_ttl = 300  # 非交易时段 5分钟

# 指数TTL
index_trading_ttl = 30      # 交易时段 30秒
index_non_trading_ttl = 300 # 非交易时段 5分钟

# 其他资产类型TTL
forex_ttl = 3600            # 外汇 1小时（汇率日内波动）
bond_ttl = 7200             # 债券 2小时（更新频率低）
gold_ttl = 86400            # 黄金储备 1天（月度发布数据）
gpr_ttl = 86400             # 地缘风险指数 1天

# 兼容旧配置
quote_short_ttl = 300       # [兼容] 短TTL
quote_long_ttl = 3600       # [兼容] 长TTL

# ============================================================
# 数据源配置 - 消除硬编码
# ============================================================
[source]
# 数据源优先级
quote_priority = ["eastmoney", "sina", "yahoo"]
forex_priority = ["frankfurter", "exchangerate"]
gold_priority = ["fred", "imf"]
fallback_enabled = true     # 启用数据源降级

[datasource]
# 新浪数据源
sina_base_url = "https://hq.sinajs.cn"
sina_cn_quote = "https://hq.sinajs.cn/list={code}"

# 东方财富数据源
eastmoney_quote_api = "https://push2.eastmoney.com/api/qt/stock/get"
eastmoney_batch_api = "https://push2.eastmoney.com/api/qt/ulist.np/get"

# 天天基金数据源
fund_gz_api = "https://fundgz.1234567.com.cn/js/{code}.js"

# 汇率数据源
frankfurter_base = "https://api.frankfurter.app"
exchangerate_base = "https://api.exchangerate.host"

# 黄金数据源
fred_base_url = "https://api.stlouisfed.org/fred"
imf_base_url = "https://dataservices.imf.org/REST/SDMX_JSON.svc"

# GPR数据源
gpr_data_url = "https://www.matteoiacoviello.com/gpr_files/data_gpr_export.xls"

# ============================================================
# 交易时段配置
# ============================================================
[trading_hours]
# A股
cn_morning_start = "09:30"
cn_morning_end = "11:30"
cn_afternoon_start = "13:00"
cn_afternoon_end = "15:00"

# 港股
hk_morning_start = "09:30"
hk_morning_end = "12:00"
hk_afternoon_start = "13:00"
hk_afternoon_end = "16:00"

# 美股
us_pre_market_start = "21:30"
us_pre_market_end = "04:00"

# ============================================================
# HTTP 请求配置
# ============================================================
[http]
total_timeout = 30          # 请求总超时(秒)
connect_timeout = 10        # 连接超时(秒)
max_retries = 3             # 最大重试次数
retry_delay = 1.0           # 重试延迟(秒)
max_concurrent = 10         # 最大并发请求数

# ============================================================
# Redis 缓存配置
# ============================================================
[redis]
enabled = false             # 是否启用 Redis
host = "127.0.0.1"
port = 6379
password = ""
db = 0
prefix = "fcli:"
pool_size = 10

# ============================================================
# 代理配置
# ============================================================
[proxy]
http = ""
https = ""
enabled = false

# ============================================================
# 黄金相关配置
# ============================================================
[gold]
price_usd_per_ounce = 2300.0
wan_oz_to_tonne = 0.311035  # 万盎司转换为吨的系数

# ============================================================
# 展示层配置
# ============================================================
[display]
# 市场名称映射
market_map = { CN = "沪深", HK = "港股", US = "美股", FUND = "基金", GLOBAL = "全球", FOREX = "外汇", BOND = "债券" }

# 资产类型名称映射
type_map = { STOCK = "股票", FUND = "基金", INDEX = "指数", FOREX = "外汇", BOND = "债券" }

# 资产类型颜色
type_color = { STOCK = "yellow", FUND = "magenta", INDEX = "blue", FOREX = "cyan", BOND = "white" }
